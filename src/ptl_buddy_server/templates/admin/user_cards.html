<div id="user-{{ user.id }}-cards">
  {% for card in cards %}
  <div style="display:flex; align-items:center; gap:.5rem; margin-bottom:.25rem">
    <code style="flex:1; font-size:.875rem">{{ card.id }}</code>
    <button class="btn-sm secondary"
            hx-post="{{ url_for('admin.card_delete', user_id=user.id, card_id=card.id) }}"
            hx-target="#user-{{ user.id }}-cards"
            hx-swap="outerHTML">Remove</button>
  </div>
  {% else %}
  <p style="color:var(--pico-muted-color); font-size:.875rem; margin:0 0 .5rem">No badges</p>
  {% endfor %}
  <form hx-post="{{ url_for('admin.card_create', user_id=user.id) }}"
        hx-target="#user-{{ user.id }}-cards"
        hx-swap="outerHTML"
        hx-on::after-request="if(event.detail.successful) this.reset()"
        style="display:flex; gap:.5rem; align-items:stretch; margin-top:.5rem; margin-bottom:0">
    <input type="text" name="card_id" class="nfc-input" placeholder="Badge ID" style="margin:0; flex:1" required>
    <button type="button" class="nfc-scan-btn secondary" style="display:none; width:auto; margin:0" onclick="startNFCScan(this)">📡 NFC</button>
    <button type="submit" style="width:auto; margin:0">Add</button>
  </form>
</div>
