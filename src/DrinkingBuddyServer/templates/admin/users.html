{% extends 'admin/base.html' %}
{% block title %}Users{% endblock %}

{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
  <h2 style="margin:0">Users</h2>
  <button onclick="document.getElementById('add-user-dialog').showModal()">Add User</button>
</div>

<form id="filter-form"
      hx-get="{{ url_for('admin.users_rows') }}"
      hx-target="#users-tbody"
      hx-trigger="input changed delay:200ms from:#q-input, sort-changed from:#filter-form">
  <input type="search" id="q-input" name="q" placeholder="Filter by name or LDAP user…" autocomplete="off" style="margin-bottom:1rem">
  <input type="hidden" name="sort" id="sort-field" value="name">
  <input type="hidden" name="dir"  id="sort-dir"   value="asc">
</form>

<figure>
  <table>
    <thead>
      <tr>
        <th class="col-action"></th>
        <th><span class="sort-btn active" data-sort="name"     onclick="setSort(this)">Name     <span class="sort-arrow">↑</span></span></th>
        <th><span class="sort-btn"        data-sort="balance"  onclick="setSort(this)">Balance  <span class="sort-arrow">↕</span></span></th>
      </tr>
    </thead>
    <tbody id="users-tbody">
      {% for user in users %}
      {% include 'admin/user_row.html' %}
      {% endfor %}
    </tbody>
  </table>
</figure>

<!-- Edit dialog -->
<dialog id="edit-user-dialog">
  <article>
    <header>
      <h3>Edit User</h3>
      <button aria-label="Close" rel="prev" onclick="this.closest('dialog').close()"></button>
    </header>
    <div id="edit-user-content"></div>
  </article>
</dialog>

<!-- Add dialog -->
<dialog id="add-user-dialog">
  <article>
    <header>
      <h3>Add User</h3>
      <button aria-label="Close" rel="prev" onclick="this.closest('dialog').close()"></button>
    </header>
    <form method="post" action="{{ url_for('admin.user_create') }}">
      <label>
        Name
        <input name="name" required>
      </label>
      <label>
        Balance (CHF)
        <input type="number" step="0.01" name="balance" value="0.00">
      </label>
      <label>
        LDAP Username
        <input name="ldap_user" placeholder="optional">
      </label>
      <label>
        Type
        <select name="type">
          <option value="1">Member</option>
          <option value="2">Admin</option>
          <option value="0">Inactive</option>
        </select>
      </label>
      <footer>
        <button type="button" class="secondary" onclick="this.closest('dialog').close()">Cancel</button>
        <button type="submit">Add</button>
      </footer>
    </form>
  </article>
</dialog>
{% endblock %}
